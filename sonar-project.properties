sonar.projectKey=grob-lang_grob
sonar.organization=grob-lang

# Sources and tests
sonar.sources=src/
sonar.tests=tests/

# Coverage report — Cobertura from `dotnet test --collect:"XPlat Code Coverage"`
sonar.cs.cobertura.reportsPaths=**/TestResults/**/coverage.cobertura.xml

# Coverage exclusions — see docs/dev/coverage-policy.md
sonar.coverage.exclusions=**/Grob.Cli/Program.cs,**/Grob.Lsp/Program.cs

# Test projects excluded from coverage measurement by convention
sonar.test.exclusions=**/*.Tests/**

sonar.sourceEncoding=UTF-8
