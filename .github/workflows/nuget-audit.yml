name: "Security: NuGet Audit"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel an in-flight run when a newer commit lands on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nuget-audit:
    name: NuGet vulnerability gate
    runs-on: ubuntu-latest

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          global-json-file: global.json

      # Locked-mode restore: the committed lockfiles must satisfy the restore
      # exactly. An unexpected transitive change fails here rather than resolving
      # silently. This is also the dependency-integrity gate (D-317).
      - name: Restore (locked mode)
        run: dotnet restore --locked-mode

      # `dotnet list package --vulnerable` exits 0 even when it reports
      # advisories, so the gate parses its structured JSON output (stable across
      # CLI locale and wording changes, unlike the console text). Any
      # vulnerability anywhere in the tree fails the job. --include-transitive
      # widens it past direct dependencies. This complements the restore-time
      # NuGetAudit in Directory.Build.props with an explicit CI gate.
      - name: Audit packages for known vulnerabilities
        run: |
          set -euo pipefail
          dotnet list Grob.slnx package --vulnerable --include-transitive --format json > audit.json
          cat audit.json
          count="$(jq '[.. | objects | select(has("vulnerabilities")) | .vulnerabilities[]] | length' audit.json)"
          if [ "$count" -gt 0 ]; then
            echo "::error::$count vulnerable NuGet package advisory(ies) detected. See audit.json above."
            exit 1
          fi
          echo "No vulnerable packages reported."
