name: "Security: NuGet Audit"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel an in-flight run when a newer commit lands on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nuget-audit:
    name: NuGet vulnerability gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          global-json-file: global.json

      # Locked-mode restore: the committed lockfiles must satisfy the restore
      # exactly. An unexpected transitive change fails here rather than resolving
      # silently. This is also the dependency-integrity gate (D-317).
      - name: Restore (locked mode)
        run: dotnet restore --locked-mode

      # `dotnet list package --vulnerable` exits 0 even when it reports
      # advisories, so the gate parses its output. Any "vulnerable packages"
      # banner fails the job. --include-transitive widens it past direct
      # dependencies. This complements the restore-time NuGetAudit in
      # Directory.Build.props with an explicit, greppable CI gate.
      - name: Audit packages for known vulnerabilities
        run: |
          set -euo pipefail
          report="$(dotnet list package --vulnerable --include-transitive 2>&1)"
          echo "$report"
          if echo "$report" | grep -q "has the following vulnerable packages"; then
            echo "::error::Vulnerable NuGet packages detected. See the report above."
            exit 1
          fi
          echo "No vulnerable packages reported."
