name: "Security: TruffleHog"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  TruffleHog:
    name: TruffleHog
    runs-on: ubuntu-latest

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # fetch-depth: 0 retrieves the full git history so TruffleHog can scan
          # every commit when running on a push to main.
          fetch-depth: 0
          persist-credentials: false

      # On push to main: scan the entire git history for verified secrets.
      - name: TruffleHog scan (full history – push to main)
        if: github.event_name == 'push'
        uses: trufflesecurity/trufflehog@27b0417c16317ca9a472a9a8092acce143b49c55 # v3.95.9
        with:
          extra_args: --only-verified

      # On pull requests: scope the scan to the diff between base and head
      # commits only, keeping CI fast and avoiding re-flagging old history.
      - name: TruffleHog scan (PR diff only)
        if: github.event_name == 'pull_request'
        uses: trufflesecurity/trufflehog@27b0417c16317ca9a472a9a8092acce143b49c55 # v3.95.9
        with:
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified
