name: Benchmarks

on:
  workflow_dispatch:
    inputs:
      runner:
        description: "Runner to benchmark on"
        required: false
        default: "windows-latest"
        type: choice
        options:
          - ubuntu-latest
          - windows-latest

permissions:
  contents: read

jobs:
  benchmark:
    name: Compile Benchmarks (${{ inputs.runner }})
    runs-on: ${{ inputs.runner }}

    steps:
      # harden-runner only supports Linux runners; the benchmark runner can be
      # windows-latest, so this is skipped there.
      - name: Harden runner
        if: runner.os == 'Linux'
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Benchmark job only reads the repo; no credentials needed downstream.
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          global-json-file: global.json

      - name: Restore
        run: |
          dotnet restore bench/Grob.Benchmarks/Grob.Benchmarks.csproj --locked-mode
          dotnet restore tooling/Grob.BenchCheck/Grob.BenchCheck.csproj --locked-mode

      - name: Run benchmarks
        run: >
          dotnet run --configuration Release
          --project bench/Grob.Benchmarks
          -- --filter '*' --exporters fulljson markdown

      - name: Publish results to job summary
        if: always()
        shell: bash
        run: |
          for f in BenchmarkDotNet.Artifacts/results/*.md; do
            [ -f "$f" ] || continue
            echo "## $(basename "$f")" >> "$GITHUB_STEP_SUMMARY"
            cat "$f" >> "$GITHUB_STEP_SUMMARY"
          done

      # The regression gate (D-313). Compares the fresh run against the committed
      # rolling and frozen-origin baselines and fails the job on a breach, so the
      # workflow run itself goes red. Reads only — it never commits a baseline.
      # A run on a non-canonical runner fails the runner guard by design.
      - name: Check regression gate
        run: >
          dotnet run --configuration Release --no-restore
          --project tooling/Grob.BenchCheck
          --
          --results BenchmarkDotNet.Artifacts/results
          --baseline bench/Grob.Benchmarks/baseline

      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: benchmark-results-${{ inputs.runner }}-${{ github.run_id }}
          path: BenchmarkDotNet.Artifacts/results/
          retention-days: 90
