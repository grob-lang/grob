name: "Security: Trivy"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Minimum permissions: read source, write SARIF results to Code Scanning.
permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  trivy-scan:
    name: Trivy Scan
    runs-on: ubuntu-latest

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@5c7944e73c4c2a096b17a9cb74d65b6c2bbafbde # v2.9.1
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      # First pass: emit SARIF covering all severity levels so that MEDIUM and
      # lower findings still appear in the GitHub Security → Code scanning tab.
      # exit-code is 0 here so the upload step is always reached regardless of
      # what Trivy finds.
      - name: Run Trivy filesystem scan (SARIF output)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          exit-code: "0"
          # Skip .NET build artifacts and VCS metadata to avoid false positives
          # from binaries that are not part of the distributed package.
          skip-dirs: .git,**/bin,**/obj

      # Upload the SARIF file so findings appear in the Security tab alongside
      # CodeQL results. `if: always()` ensures upload runs even if later steps
      # fail.
      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        if: always()
        with:
          sarif_file: trivy-results.sarif

      # Second pass: re-run scoped to CRITICAL and HIGH only and fail the
      # workflow if any are found. MEDIUM and lower are informational (uploaded
      # above) but do not block merges.
      # skip-setup-trivy avoids re-downloading the Trivy binary installed above.
      - name: Fail on CRITICAL and HIGH vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: "1"
          severity: CRITICAL,HIGH
          skip-dirs: .git,**/bin,**/obj
          skip-setup-trivy: true
