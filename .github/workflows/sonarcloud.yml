name: "Quality: SonarCloud"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  # Required for SonarCloud to post inline PR-decoration comments.
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest

    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full git history is required for SonarCloud blame annotations and
          # accurate "new code" detection on pull requests.
          fetch-depth: 0
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5
        with:
          global-json-file: global.json

      # dotnet-sonarscanner is a Java process; JRE 17+ must be on PATH
      # before the tool is installed or invoked.
      - name: Setup Java 17
        uses: actions/setup-java@ad2b38190b15e4d6bdf0c97fb4fca8412226d287 # v5
        with:
          distribution: temurin
          java-version: "17"

      # Restore the version-pinned scanner from .config/dotnet-tools.json rather
      # than installing an unpinned global tool (D-317), so the analysis runs the
      # same scanner version every time.
      - name: Restore tools
        run: dotnet tool restore

      # Begin wraps the subsequent MSBuild in sensors that collect metrics
      # (duplications, issues, etc.).  The coverage-path glob tells Sonar
      # where coverlet will write its OpenCover XML files after the test
      # step.  GITHUB_TOKEN enables inline PR-decoration on github.com.
      # sonar.qualitygate.wait must be passed to begin (not end) so the
      # .NET SonarScanner honours it as an analysis property.
      - name: Begin SonarCloud scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet sonarscanner begin \
            /k:"grob-lang_grob" \
            /o:"grob-lang" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.token="$SONAR_TOKEN" \
            /d:sonar.cs.opencover.reportsPaths="**/TestResults/**/coverage.opencover.xml" \
            /d:sonar.coverage.exclusions="**/Grob.Cli/Program.cs,**/Grob.Lsp/Program.cs,**/bench/**" \
            /d:sonar.test.exclusions="**/*.Tests/**" \
            /d:sonar.qualitygate.wait=true \
            /d:sonar.issue.ignore.multicriteria="e1,e2,e3,e4" \
            /d:sonar.issue.ignore.multicriteria.e1.ruleKey="csharpsquid:S1244" \
            /d:sonar.issue.ignore.multicriteria.e1.resourceKey="src/Grob.Vm/VirtualMachine.cs" \
            /d:sonar.issue.ignore.multicriteria.e2.ruleKey="csharpsquid:S3776" \
            /d:sonar.issue.ignore.multicriteria.e2.resourceKey="src/Grob.Vm/VirtualMachine.cs" \
            /d:sonar.issue.ignore.multicriteria.e3.ruleKey="csharpsquid:S4487" \
            /d:sonar.issue.ignore.multicriteria.e3.resourceKey="src/Grob.Vm/VirtualMachine.cs" \
            /d:sonar.issue.ignore.multicriteria.e4.ruleKey="csharpsquid:S3267" \
            /d:sonar.issue.ignore.multicriteria.e4.resourceKey="src/Grob.Compiler/**"
      - name: Restore dependencies
        run: dotnet restore --locked-mode

      - name: Build
        run: dotnet build --no-restore --configuration Release

      # The `-- DataCollectionRunSettings...` inline arguments override the
      # coverlet output format and apply the same file exclusions declared in
      # sonar.coverage.exclusions above, so the Python coverage floor gate
      # and SonarCloud measure the same in-scope denominator.
      - name: Test with coverage
        run: |
          dotnet test --no-build --configuration Release \
            --collect:"XPlat Code Coverage" \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover \
            DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.ExcludeByFile="**/Grob.Cli/Program.cs,**/Grob.Lsp/Program.cs,**/bench/**"

      # D-328: overall in-scope line-coverage regression guard.  Aggregates
      # the OpenCover XML reports (already filtered by ExcludeByFile above)
      # and fails the job if blended coverage drops below 80%.  This is a
      # ratchet floor on the in-scope denominator, not the 90% new-code gate
      # (which SonarCloud enforces server-side via sonar.qualitygate.wait).
      - name: Check coverage floor (80%)
        run: |
          python3 - << 'EOF'
          import xml.etree.ElementTree as ET, glob, sys
          visited = total = 0
          for f in glob.glob('**/TestResults/**/coverage.opencover.xml', recursive=True):
              root = ET.parse(f).getroot()
              s = root.find('Summary')
              if s is not None:
                  visited += int(s.get('visitedSequencePoints', 0))
                  total   += int(s.get('numSequencePoints', 0))
          if total == 0:
              print('No coverage data found.', file=sys.stderr)
              sys.exit(1)
          pct = 100 * visited / total
          print(f'Coverage: {pct:.1f}% ({visited}/{total} sequence points)')
          sys.exit(0 if pct >= 80 else 1)
          EOF

      # End uploads the collected analysis data to SonarCloud.  The token
      # must be supplied again because the end step authenticates
      # independently of the begin step.
      - name: End SonarCloud scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"
