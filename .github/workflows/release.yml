name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build-release:
    name: Build ${{ matrix.rid }}
    permissions:
      contents: write
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact: grob-win-x64.zip
          - os: ubuntu-latest
            rid: linux-x64
            artifact: grob-linux-x64.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          global-json-file: global.json

      - name: Publish self-contained
        run: >
          dotnet publish src/Grob.Cli/Grob.Cli.csproj
          --configuration Release
          --runtime ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:PublishTrimmed=true
          --output ./publish

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        run: Compress-Archive -Path ./publish/* -DestinationPath ${{ matrix.artifact }}
        shell: pwsh

      - name: Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: tar -czf ${{ matrix.artifact }} -C ./publish .

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ matrix.rid }}
          path: ${{ matrix.artifact }}

  create-release:
    name: Create Release
    needs: build-release
    runs-on: ubuntu-latest
    permissions:
      # contents: write to create GitHub releases and upload assets.
      contents: write
      # id-token + attestations: write are required by
      # actions/attest-build-provenance to mint a signed provenance statement
      # for the published artifacts (D-317). This job only runs on a v* tag
      # push, so the attestation is produced exactly when artifacts ship and
      # never on an ordinary build. Full release signing / SLSA L3 is OQ-018.
      id-token: write
      attestations: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            win-x64/grob-win-x64.zip
            linux-x64/grob-linux-x64.tar.gz

      - name: Create GitHub release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          generate_release_notes: true
          files: |
            win-x64/grob-win-x64.zip
            linux-x64/grob-linux-x64.tar.gz
