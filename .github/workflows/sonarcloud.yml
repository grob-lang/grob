name: "Quality: SonarCloud"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  # Required for SonarCloud to post inline PR-decoration comments.
  pull-requests: write

jobs:
  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Full git history is required for SonarCloud blame annotations and
          # accurate "new code" detection on pull requests.
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      # dotnet-sonarscanner is a Java process; JRE 17+ must be on PATH
      # before the tool is installed or invoked.
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dotnet-sonarscanner
        run: dotnet tool install --global dotnet-sonarscanner

      # Begin wraps the subsequent MSBuild in sensors that collect metrics
      # (duplications, issues, etc.).  The coverage-path glob tells Sonar
      # where coverlet will write its OpenCover XML files after the test
      # step.  GITHUB_TOKEN enables inline PR-decoration on github.com.
      - name: Begin SonarCloud scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet sonarscanner begin \
            /k:"<project-key-from-sonarcloud>" \
            /o:"<organisation-key-from-sonarcloud>" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.token="$SONAR_TOKEN" \
            /d:sonar.cs.opencover.reportsPaths="**/TestResults/**/coverage.opencover.xml"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      # The `-- DataCollectionRunSettings...` inline argument overrides the
      # coverlet output format to OpenCover XML, which is the format the
      # SonarCloud .NET analyser understands.  Each test project emits its
      # own coverage file under its TestResults directory; the glob above
      # collects all of them.
      - name: Test with coverage
        run: |
          dotnet test --no-build --configuration Release \
            --collect:"XPlat Code Coverage" \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover

      # End uploads the collected analysis data to SonarCloud.  The token
      # must be supplied again because the end step authenticates
      # independently of the begin step.
      - name: End SonarCloud scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet sonarscanner end /d:sonar.token="$SONAR_TOKEN"
